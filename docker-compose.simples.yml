version: "3.9"

services:
  controller:
    image: ghcr.io/gabyluckinho/whatsapp-controller:latest
    environment:
      - PORT=${PORT}
      - API_KEY=${API_KEY}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD}
      - NODE_ENV=${NODE_ENV}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - SESSIONS=${SESSIONS}
      - HUMAN_DELAY_MIN_MS=${HUMAN_DELAY_MIN_MS}
      - HUMAN_DELAY_MAX_MS=${HUMAN_DELAY_MAX_MS}
      - MAX_MESSAGES_PER_MINUTE=${MAX_MESSAGES_PER_MINUTE}
      - WARMUP_PERIOD_HOURS=${WARMUP_PERIOD_HOURS}
      - WARMUP_MAX_MESSAGES_PER_MINUTE=${WARMUP_MAX_MESSAGES_PER_MINUTE}
    ports:
      - "3000:3000"
    volumes:
      - sessions_data:/data/sessions
    networks:
      - wa-net
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 2g

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - wa-net
    deploy:
      restart_policy:
        condition: on-failure

networks:
  wa-net:
    external: false

volumes:
  sessions_data:
  redis_data:
